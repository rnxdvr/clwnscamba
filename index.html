<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CLWNSCAM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            color: #fff;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            backdrop-filter: blur(6px);
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Poppins:wght@600;800&display=swap');
        h1, h2, h3, .logo, .btn, .stats-title {
            font-family: 'Poppins', 'Inter', sans-serif;
            font-weight: 800;
            letter-spacing: 0.02em;
        }
        .clown-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .clown {
            position: absolute;
            width: 80px;
            height: 80px;
            opacity: 0.2;
            user-select: none;
            filter: drop-shadow(0 0 8px #bf4dff);
            will-change: transform;
        }
        .glass-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(6px);
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
            z-index: 5;
        }
        .giant-clown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        .giant-clown-overlay img {
            width: 60vw;
            max-width: 500px;
            filter: drop-shadow(0 0 50px #ff66b2);
        }
        .giant-clown-overlay.show {
            opacity: 1;
            transition: opacity 0.1s;
        }
        .giant-clown-overlay.fadeout {
            opacity: 0;
            transition: opacity 1.5s;
        }
        .header {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1300px;
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 5, 15, 0.7);
            border-bottom: 2px solid #a64dff;
            box-shadow: 0 0 30px #bf4dff4d;
            border-radius: 0 0 30px 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .header:hover {
            transform: scale(1.01);
            box-shadow: 0 0 15px #bf4dff, 0 0 20px #ff80ff;
        }
        .header-left {
            flex: 1;
            display: flex;
            justify-content: flex-start;
        }
        .header-center {
            flex: 1;
            display: flex;
            justify-content: center;
        }
        .header-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: #d9b3ff;
            text-shadow: 0 0 20px #bf4dff, 0 0 40px #9f4dff;
            animation: glowPulse 3s infinite;
            font-family: 'Poppins', sans-serif;
        }
        @keyframes glowPulse {
            0% { text-shadow: 0 0 20px #bf4dff, 0 0 40px #9f4dff; }
            50% { text-shadow: 0 0 30px #ff80ff, 0 0 60px #bf4dff; }
            100% { text-shadow: 0 0 20px #bf4dff, 0 0 40px #9f4dff; }
        }
        .question-btn {
            background: rgba(20, 10, 30, 0.6);
            border: 2px solid #bf4dff;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px #bf4dff66;
            transition: all 0.2s;
            position: fixed;
            top: 18px;
            left: 18px;
            z-index: 15;
        }
        .question-btn img {
            width: 36px;
            height: 36px;
        }
        .question-btn:hover {
            background: #7f2fbf;
            transform: scale(1.1);
            box-shadow: 0 0 30px #bf4dff;
        }
        .twitch-btn {
            background: #4d1f7f;
            border: none;
            border-radius: 30px;
            padding: 0.5rem 1.2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #f0e6ff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 15px #bf4dff;
            transition: 0.2s;
            text-decoration: none;
            border: 1px solid #d9b3ff;
            font-family: 'Inter', sans-serif;
        }
        .twitch-btn:hover {
            background: #7f2fbf;
            box-shadow: 0 0 25px #ff80ff;
        }
        .donate-btn {
            background: #332233;
            border: 1px solid #9973aa;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #ccb3d9;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: 0.2s;
            text-decoration: none;
            opacity: 0.8;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 0 5px #bf80ff33;
        }
        .donate-btn:hover {
            background: #442244;
            border-color: #bf80ff;
            color: white;
            opacity: 1;
            box-shadow: 0 0 20px #ffb3ff, 0 0 30px #bf4dff;
            transform: scale(1.02);
        }
        .main-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            padding: 0.8rem;
        }
        .nickname-display {
            background: #1a0f2a;
            border: 2px solid #bf4dff;
            border-radius: 50px;
            padding: 0.5rem 1.8rem;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            color: #e6ccff;
            box-shadow: 0 0 25px #bf4dff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nickname-display img {
            width: 32px;
            height: 32px;
        }
        .nickname-display span {
            color: #ffb3ff;
            font-weight: 800;
        }
        .roulette-container {
            background: rgba(15, 5, 25, 0.7);
            border: 3px solid #ff66b2;
            border-radius: 50px;
            padding: 20px 40px;
            box-shadow: 0 0 25px #ff4d94, inset 0 0 8px #ff99cc55;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .roulette-wrapper {
            width: 320px;
            height: 360px;
            overflow: hidden;
            position: relative;
            border-radius: 35px;
            background: #1a0f1f;
            box-shadow: inset 0 0 25px #000;
            margin: 15px 0;
            border: 2px solid #ff80bf;
        }
        .roulette-wrapper::before,
        .roulette-wrapper::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 60px;
            z-index: 10;
            pointer-events: none;
        }
        .roulette-wrapper::before {
            top: 0;
            background: linear-gradient(to bottom, #1a0f1f, transparent);
        }
        .roulette-wrapper::after {
            bottom: 0;
            background: linear-gradient(to top, #1a0f1f, transparent);
        }
        .roulette-wrapper.lens-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 35px;
            pointer-events: none;
            animation: lensPulse 1.2s infinite;
            z-index: 15;
        }
        .roulette-wrapper.scam-lens::after {
            background: radial-gradient(circle at center, #ff4d94 0%, transparent 80%);
        }
        .roulette-wrapper.not-scam-lens::after {
            background: radial-gradient(circle at center, #66ff66 0%, transparent 80%);
        }
        @keyframes lensPulse {
            0% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.08); }
            100% { opacity: 0.4; transform: scale(1); }
        }
        .roulette-items {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }
        .roulette-item {
            height: 120px;
            width: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            background: #0f0f1a;
            color: #ffffff;
            text-shadow: 0 0 15px #ff4d94, 0 0 30px #ff80bf, 2px 2px 0 #330033;
            border-bottom: 3px solid #ff99cc;
            border-top: 3px solid #ff99cc;
            font-family: 'Poppins', sans-serif;
        }
        .roulette-item.scam {
            color: #ff4d94;
            text-shadow: 0 0 25px #ff1a75, 0 0 50px #ff4d94, 0 0 75px #ff00aa;
        }
        .roulette-item.not-scam {
            color: #66ff66;
            text-shadow: 0 0 25px #00ff80, 0 0 50px #33ff33, 0 0 75px #00cc66;
        }
        .side-indicator {
            position: absolute;
            top: 50%;
            width: 0;
            height: 0;
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            filter: drop-shadow(0 0 12px #ff99cc);
            z-index: 12;
            transform: translateY(-50%);
        }
        .side-indicator.left {
            left: 10px;
            border-left: 20px solid #ff4d94;
        }
        .side-indicator.right {
            right: 10px;
            border-right: 20px solid #ff4d94;
        }
        .button-wrapper {
            width: 320px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
        }
        .button-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .btn {
            background: transparent;
            border: 2px solid #ff4d94;
            color: #ffb3d1;
            padding: 10px 22px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 0 15px #ff4d94, inset 0 0 8px #ff99cc33;
            background: rgba(20, 10, 30, 0.4);
            font-family: 'Inter', sans-serif;
        }
        .btn:hover {
            background: #ff4d94;
            color: #0b0b0b;
            box-shadow: 0 0 30px #ffb3d1;
            border-color: #fff0f5;
        }
        .btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        .btn-primary {
            background: #ff4d94;
            color: #0b0b0b;
            border-color: #ffb3d1;
            padding: 14px 38px;
            font-size: 1.4rem;
            box-shadow: 0 0 40px #ff4d94, inset 0 0 20px #ffb3d1;
            border-width: 4px;
        }
        .btn-primary:hover {
            background: #ff80b3;
            box-shadow: 0 0 50px #ffb3d1;
            transform: scale(1.05);
        }
        .stats-toggle {
            background: transparent;
            border: 2px solid #ff4d94;
            color: #ffb3d1;
            padding: 10px 26px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 0 15px #ff4d94, inset 0 0 8px #ff99cc33;
            background: rgba(20, 10, 30, 0.4);
            font-family: 'Inter', sans-serif;
            margin: 15px 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .stats-toggle:hover {
            background: #ff4d94;
            color: #0b0b0b;
            box-shadow: 0 0 30px #ffb3d1;
            border-color: #fff0f5;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 0, 10, 0.95);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal {
            background: #1a1025;
            border: 3px solid #bf4dff;
            border-radius: 50px;
            padding: 1.5rem;
            width: auto;
            max-width: 95vw;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 80px #bf4dff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .modal h2 {
            color: #f0ccff;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px #bf4dff;
            font-family: 'Poppins', sans-serif;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .modal h2 img {
            width: 48px;
            height: 48px;
        }
        .stats-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            overflow-y: auto;
            padding: 0.5rem 0.8rem;
            margin: 0 -0.5rem;
            max-height: 65vh;
            scrollbar-width: thin;
            scrollbar-color: #ff4d94 #2a1a33;
        }
        .stats-list::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .stats-list::-webkit-scrollbar-track {
            background: #2a1a33;
            border-radius: 8px;
        }
        .stats-list::-webkit-scrollbar-thumb {
            background: #ff4d94;
            border-radius: 8px;
            border: 1px solid #2a1a33;
        }
        .stats-item {
            background: #261a33;
            border-left: 6px solid #ff4d94;
            padding: 0.9rem 1.2rem;
            border-radius: 30px;
            font-size: 0.95rem;
            color: #e6d9ff;
            box-shadow: inset 0 0 10px #00000066;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .stats-item img {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }
        .stats-item .nickname {
            font-weight: 800;
            background: linear-gradient(45deg, #ff99cc, #cc66ff, #ff66b2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s infinite;
            word-break: break-word;
            flex: 1;
        }
        @keyframes shimmer {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(30deg); }
        }
        .stats-item .scam-word {
            color: #ff4d4d;
            font-weight: 700;
            text-transform: uppercase;
        }
        .stats-item .vip-word {
            color: #66ff66;
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 0 0 5px #00ff00;
        }
        .btn-close {
            background: transparent;
            border: 2px solid #ff4d94;
            color: #ffb3d1;
            padding: 10px 26px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 0 15px #ff4d94, inset 0 0 8px #ff99cc33;
            background: rgba(20, 10, 30, 0.4);
            font-family: 'Inter', sans-serif;
            margin-top: 1.2rem;
            width: 100%;
            flex-shrink: 0;
        }
        .btn-close:hover {
            background: #ff4d94;
            color: #0b0b0b;
            box-shadow: 0 0 30px #ffb3d1;
            border-color: #fff0f5;
        }
        .btn-reset {
            background: transparent;
            border: 2px solid #ff4d4d;
            color: #ff9999;
            padding: 10px 26px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 0 15px #ff4d4d66, inset 0 0 8px #ff4d4d33;
            background: rgba(30, 10, 10, 0.4);
            font-family: 'Inter', sans-serif;
            margin-top: 1rem;
            width: 100%;
        }
        .btn-reset:hover {
            background: #ff4d4d;
            color: #0b0b0b;
            box-shadow: 0 0 30px #ff9999;
            border-color: #ffcccc;
        }
        .btn-reset:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .footer {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1300px;
            text-align: center;
            padding: 0.5rem 1.5rem;
            font-size: 0.8rem;
            color: #b380cc;
            background: rgba(10, 5, 15, 0.7);
            border-top: 2px solid #a64dff;
            box-shadow: 0 0 25px #bf4dff4d;
            border-radius: 25px 25px 0 0;
            font-family: 'Inter', sans-serif;
            margin-top: auto;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .footer:hover {
            transform: scale(1.01);
            box-shadow: 0 0 15px #bf4dff, 0 0 20px #ff80ff;
        }
        @media (max-width: 480px) {
            .modal {
                padding: 1.2rem;
                border-radius: 40px;
                width: 94vw;
                max-width: 94vw;
            }
            .modal h2 {
                font-size: 1.7rem;
                gap: 10px;
            }
            .modal h2 img {
                width: 40px;
                height: 40px;
            }
            .stats-list {
                font-size: 0.9rem;
                padding: 0.4rem 0.6rem;
                max-height: 60vh;
            }
            .stats-item {
                padding: 0.8rem 1rem;
                font-size: 0.88rem;
                gap: 8px;
            }
            .stats-item img {
                width: 22px;
                height: 22px;
            }
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>

    <script>
        (function() {
            const modalNick = document.getElementById('modalNick');
            const modalWarmup = document.getElementById('modalWarmup');
            const statsModal = document.getElementById('statsModal');
            const mainApp = document.getElementById('mainApp');
            const nicknameInput = document.getElementById('nicknameInput');
            const submitNickBtn = document.getElementById('submitNickBtn');
            const warmupYesBtn = document.getElementById('warmupYesBtn');
            const warmupNoBtn = document.getElementById('warmupNoBtn');
            const currentNickSpan = document.getElementById('currentNick');
            const spinBtn = document.getElementById('spinBtn');
            const warmupSpinBtn = document.getElementById('warmupSpinBtn');
            const changeNickBtn = document.getElementById('changeNickBtn');
            const openStatsBtn = document.getElementById('openStatsBtn');
            const closeStatsBtn = document.getElementById('closeStatsBtn');
            const resetStatsBtn = document.getElementById('resetStatsBtn');
            const questionBtn = document.getElementById('questionBtn');
            const rouletteItems = document.getElementById('rouletteItems');
            const rouletteWrapper = document.getElementById('rouletteWrapper');
            const statsListModal = document.getElementById('statsListModal');
            const giantClown = document.getElementById('giantClown');
            const clownRain = document.getElementById('clownRain');
            const ITEM_HEIGHT = 120;
            const REEL_HEIGHT = 360;
            const ORIG_PAIRS = 10;
            const ORIG_ELEMENTS = ORIG_PAIRS * 2;
            const ORIG_HEIGHT = ORIG_ELEMENTS * ITEM_HEIGHT;
            const SCAM = 'СКАМ';
            const NOT_SCAM = 'НЕ СКАМ';
            const SPIN_DURATION = 5360;
            let currentNick = '';
            let firstSpinIsWarmup = false;
            let isSpinning = false;
            let spinAnimationFrame = null;
            let stats = [];
            let currentY = 0;
            try {
                const saved = localStorage.getItem('clownStats');
                if (saved) stats = JSON.parse(saved);
            } catch (e) {}
            const sound1 = new Audio('1.mp3');
            const sound2 = new Audio('2.mp3');
            sound1.load();
            sound2.load();
            const CLOWN_WIDTH = 80;
            const CLOWN_HEIGHT = 80;
            let mouseX = -1000, mouseY = -1000;
            let clowns = [];
            let animationFrame = null;
            const REPEL_RADIUS = 100;
            const REPEL_FORCE = 0.8;
            const FRICTION = 0.98;
            const GRAVITY = 0.009;
            const BASE_SPEED = 0.2;
            function createClownsJS() {
                const count = window.innerWidth <= 480 ? 40 : 90;
                clownRain.innerHTML = '';
                clowns = [];
                for (let i = 0; i < count; i++) {
                    const img = document.createElement('img');
                    img.src = 'icon-4.png';
                    img.alt = 'Clown';
                    img.className = 'clown';
                    clownRain.appendChild(img);
                    const startY = -CLOWN_HEIGHT + Math.random() * (window.innerHeight + CLOWN_HEIGHT * 2);
                    const startX = Math.random() * 100;
                    clowns.push({
                        element: img,
                        x: startX,
                        y: startY,
                        vx: (Math.random() - 0.5) * 0.2,
                        vy: BASE_SPEED + Math.random() * 0.2,
                        angle: Math.random() * 360,
                        angularSpeed: (Math.random() - 0.5) * 0.2
                    });
                }
            }
            function updateClowns() {
                const containerHeight = window.innerHeight;
                const containerWidth = window.innerWidth;
                for (let c of clowns) {
                    c.vy += GRAVITY;
                    if (mouseX >= 0 && mouseY >= 0) {
                        const clownX_px = (c.x / 100) * containerWidth;
                        const clownY_px = c.y;
                        const dx = clownX_px - mouseX;
                        const dy = clownY_px - mouseY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < REPEL_RADIUS) {
                            const force = (1 - dist / REPEL_RADIUS) * REPEL_FORCE;
                            const angle = Math.atan2(dy, dx);
                            c.vx += Math.cos(angle) * force;
                            c.vy += Math.sin(angle) * force;
                        }
                    }
                    c.vx *= FRICTION;
                    c.y += c.vy;
                    c.x += c.vx / containerWidth * 100;
                    c.angle += c.angularSpeed;
                    if (c.y > containerHeight + CLOWN_HEIGHT * 2) {
                        c.y = -CLOWN_HEIGHT - Math.random() * 200;
                        c.x = Math.random() * 100;
                        c.vx = (Math.random() - 0.5) * 0.2;
                        c.vy = BASE_SPEED + Math.random() * 0.2;
                        c.angle = Math.random() * 360;
                    }
                    if (c.x < 0) c.x = 0;
                    if (c.x > 100) c.x = 100;
                    c.element.style.left = c.x + '%';
                    c.element.style.transform = `translateY(${c.y}px) rotate(${c.angle}deg)`;
                }
                animationFrame = requestAnimationFrame(updateClowns);
            }
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
            window.addEventListener('mouseleave', () => {
                mouseX = -1000;
                mouseY = -1000;
            });
            function startClownRain() {
                createClownsJS();
                if (animationFrame) cancelAnimationFrame(animationFrame);
                animationFrame = requestAnimationFrame(updateClowns);
            }
            window.addEventListener('load', startClownRain);
            window.addEventListener('resize', startClownRain);
            function buildRouletteItems() {
                let html = '';
                for (let i = 0; i < ORIG_PAIRS; i++) {
                    html += `<div class="roulette-item scam">${SCAM}</div>`;
                    html += `<div class="roulette-item not-scam">${NOT_SCAM}</div>`;
                }
                rouletteItems.innerHTML = html + html;
                currentY = 0;
                rouletteItems.style.transform = `translateY(-${currentY}px)`;
            }
            buildRouletteItems();
            function saveStats() {
                localStorage.setItem('clownStats', JSON.stringify(stats));
            }
            function formatDate(date) {
                return `${date.getDate().toString().padStart(2,'0')}.${(date.getMonth()+1).toString().padStart(2,'0')}.${date.getFullYear()}`;
            }
            function formatDateTime(date) {
                return `${formatDate(date)} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}:${date.getSeconds().toString().padStart(2,'0')}`;
            }
            function addStatEntry(result, nickname) {
                const now = new Date();
                let text = '';
                if (result === NOT_SCAM) {
                    const start = formatDate(now);
                    const endDate = new Date(now);
                    endDate.setDate(now.getDate() + 31);
                    const end = formatDate(endDate);
                    text = `${formatDateTime(now)} | <span class="nickname">${nickname}</span> | <span class="vip-word">ВИП</span> С ${start} ПО ${end}`;
                } else {
                    text = `${formatDateTime(now)} | <span class="nickname">${nickname}</span> | <span class="scam-word">успешно проебал</span> 15000 роторных клоунов`;
                }
                const entry = `<img src="icon-4.png" alt="Clown" style="width:24px;height:24px;vertical-align:middle;"> ${text}`;
                stats.push(entry);
                saveStats();
                renderStatsModal();
            }
            function renderStatsModal() {
                if (stats.length === 0) {
                    statsListModal.innerHTML = '<li class="stats-item" style="text-align:center; opacity:0.6;">Ты еще не гемблил, че залез сюда? <img src="icon-4.png" alt="Clown" style="width:24px;height:24px;vertical-align:middle;"></li>';
                } else {
                    statsListModal.innerHTML = stats.map(s => `<li class="stats-item">${s}</li>`).join('');
                }
            }
            function setLensEffect(active, isScam = null) {
                rouletteWrapper.classList.remove('lens-effect', 'scam-lens', 'not-scam-lens');
                if (active) {
                    rouletteWrapper.classList.add('lens-effect');
                    if (isScam) {
                        rouletteWrapper.classList.add('scam-lens');
                    } else {
                        rouletteWrapper.classList.add('not-scam-lens');
                    }
                }
            }
            function getRandomIndex(targetIsScam) {
                const indices = [];
                for (let i = 0; i < ORIG_ELEMENTS; i++) {
                    if ((targetIsScam && i % 2 === 0) || (!targetIsScam && i % 2 === 1)) {
                        indices.push(i);
                    }
                }
                return indices[Math.floor(Math.random() * indices.length)];
            }
            function startSpin(targetIsScam, isWarmupSpin = false) {
                if (isSpinning) return;
                isSpinning = true;
                setLensEffect(false);
                spinBtn.disabled = true;
                warmupSpinBtn.disabled = true;
                sound1.currentTime = 0;
                sound1.play().catch(() => {});
                currentY = currentY % ORIG_HEIGHT;
                if (currentY < 0) currentY += ORIG_HEIGHT;
                rouletteItems.style.transform = `translateY(-${currentY}px)`;
                const targetIndex = getRandomIndex(targetIsScam);
                const centerOffset = (REEL_HEIGHT / 2) - (ITEM_HEIGHT / 2);
                const extraRotations = 3 + Math.floor(Math.random() * 4);
                const targetY = (targetIndex + extraRotations * ORIG_ELEMENTS) * ITEM_HEIGHT - centerOffset;
                const startY = currentY;
                const distance = targetY - startY;
                const startTime = performance.now();
                function animate(now) {
                    const elapsed = now - startTime;
                    let progress = Math.min(elapsed / SPIN_DURATION, 1);
                    const easeProgress = 2 * progress - progress * progress;
                    let newY = startY + distance * easeProgress;
                    while (newY >= ORIG_HEIGHT) {
                        newY -= ORIG_HEIGHT;
                    }
                    rouletteItems.style.transform = `translateY(-${newY}px)`;
                    if (progress < 1) {
                        spinAnimationFrame = requestAnimationFrame(animate);
                    } else {
                        let finalY = targetY;
                        while (finalY >= ORIG_HEIGHT) {
                            finalY -= ORIG_HEIGHT;
                        }
                        rouletteItems.style.transform = `translateY(-${finalY}px)`;
                        currentY = finalY;
                        isSpinning = false;
                        spinBtn.disabled = false;
                        warmupSpinBtn.disabled = false;
                        sound2.currentTime = 0;
                        sound2.play().catch(() => {});
                        const resultText = targetIsScam ? SCAM : NOT_SCAM;
                        if (!isWarmupSpin && !(firstSpinIsWarmup && stats.length === 0)) {
                            addStatEntry(resultText, currentNick);
                        }
                        if (firstSpinIsWarmup && stats.length === 0) {
                            firstSpinIsWarmup = false;
                        }
                        showGiantClown();
                        setLensEffect(true, targetIsScam);
                    }
                }
                spinAnimationFrame = requestAnimationFrame(animate);
            }
            function showGiantClown() {
                giantClown.innerHTML = '<img src="icon-4.png" alt="Clown">';
                giantClown.classList.add('show');
                giantClown.classList.remove('fadeout');
                setTimeout(() => giantClown.classList.add('fadeout'), 50);
                setTimeout(() => {
                    giantClown.classList.remove('show', 'fadeout');
                    giantClown.innerHTML = '';
                }, 1550);
            }
            function resetStatistics() {
                if (confirm("ТЫ УВЕРЕН?")) {
                    stats = [];
                    saveStats();
                    renderStatsModal();
                    alert("Статистика сброшена");
                }
            }
            submitNickBtn.addEventListener('click', () => {
                const nick = nicknameInput.value.trim();
                if (!nick) { alert('Введите ник!'); return; }
                currentNick = nick;
                currentNickSpan.textContent = currentNick;
                modalNick.classList.add('hidden');
                modalWarmup.classList.remove('hidden');
            });
            warmupYesBtn.addEventListener('click', () => {
                firstSpinIsWarmup = true;
                modalWarmup.classList.add('hidden');
                mainApp.classList.remove('hidden');
            });
            warmupNoBtn.addEventListener('click', () => {
                firstSpinIsWarmup = false;
                modalWarmup.classList.add('hidden');
                mainApp.classList.remove('hidden');
            });
            changeNickBtn.addEventListener('click', () => {
                modalNick.classList.remove('hidden');
                mainApp.classList.add('hidden');
                nicknameInput.value = currentNick;
                modalWarmup.classList.add('hidden');
            });
            spinBtn.addEventListener('click', () => {
                if (!currentNick) { changeNickBtn.click(); return; }
                const random = Math.random() < 0.5;
                startSpin(random, false);
            });
            warmupSpinBtn.addEventListener('click', () => {
                if (!currentNick) { changeNickBtn.click(); return; }
                const random = Math.random() < 0.5;
                startSpin(random, true);
            });
            openStatsBtn.addEventListener('click', () => {
                renderStatsModal();
                statsModal.classList.remove('hidden');
            });
            closeStatsBtn.addEventListener('click', () => {
                statsModal.classList.add('hidden');
            });
            resetStatsBtn.addEventListener('click', resetStatistics);
            questionBtn.addEventListener('click', () => {
                showGiantClown();
            });
            window.addEventListener('click', (e) => {
                if (e.target === statsModal) statsModal.classList.add('hidden');
            });
            nicknameInput.focus();
            if (!currentNick) {
                modalNick.classList.remove('hidden');
            } else {
                mainApp.classList.remove('hidden');
            }
        })();
    </script>
</body>
</html>
